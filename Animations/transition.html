<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box {
            width: 100px;
            height: 100px;
            background-color: red;
            /* Transition property */
            transition-property: background-color,width;
            transition-duration: 1s;
            transition-delay: 0s;

        }
        #box:hover{
            background-color: blue;
            width: 200px;
        }
    </style>
</head>
<body>
    <div id="box">

    </div>
</body>
</html>
