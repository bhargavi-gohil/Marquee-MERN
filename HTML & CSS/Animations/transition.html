<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box {
            width: 100px;
            height: 100px;
            background-color: rgb(234, 226, 226);

            /* Transition property */
            transition-property: background-color,width,color;
            transition-duration: 1s;
            transition-delay: 0s;
            border-radius: 10px;

            /* Animation property */
            animation-name: pop-in-out;
            animation-duration: 1s;
            animation-iteration-count: 2;
        }
        @keyframes pop-in-out {
            /* initial to final */
            0% {
                background-color: ghostwhite;
                margin-left: 0;
            }
            25% {
                background-color: black;
                margin-left: 150px;
            }
            50% {
                
            }
        }
        #box:hover{
            background-color: rgb(91, 219, 202);
            width: 300px;
            color: green;
        }
        h3{
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="box">
        <h3>Hover to see the transition.</h3>
    </div>
</body>
</html>
